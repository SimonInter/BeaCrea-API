# Database
quarkus.datasource.db-kind=postgresql

# Dev: PostgreSQL lancé manuellement dans Podman (voir commande ci-dessous)
# podman run -d --name beacrea-db -e POSTGRES_PASSWORD=beacrea -e POSTGRES_DB=beacrea -p 5432:5432 postgres:16
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/beacrea
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=beacrea
%dev.quarkus.datasource.devservices.enabled=false

# Dev: update schema without dropping data (seed via import.sql avec ON CONFLICT DO NOTHING)
%dev.quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=false

# Jackson: dates as ISO strings
quarkus.jackson.serialization.write-dates-as-timestamps=false

# CORS: autorise le frontend Vite en dev + Netlify en prod
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,${ALLOWED_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.access-control-allow-credentials=true

# JWT : secret de signature HMAC-SHA256 (min 32 chars)
# En dev : valeur fixe pour simplifier. En prod : injecter JWT_SECRET via Railway.
%dev.beacrea.jwt.secret=dev-secret-beacrea-change-in-prod-must-be-32chars
%dev.beacrea.jwt.expiration-days=7
%prod.beacrea.jwt.secret=${JWT_SECRET}
%prod.beacrea.jwt.expiration-days=7

# Brevo : emails transactionnels
# En dev : laisser DISABLED pour désactiver l'envoi (les logs restent visibles dans la console)
# En prod : injecter BREVO_API_KEY via Railway
%dev.brevo.api-key=${BREVO_API_KEY:DISABLED}
%prod.brevo.api-key=${BREVO_API_KEY}
brevo.sender-email=contact@beacrea.fr
brevo.sender-name=BeaCrea
brevo.admin-email=admin@beacrea.fr

# Stripe : paiements en ligne
# En dev : clé secrète test depuis dashboard.stripe.com/test/apikeys
%dev.stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_REMPLACER_PAR_VOTRE_CLE}
%prod.stripe.secret-key=${STRIPE_SECRET_KEY}

# Production (valeurs injectées via variables d'environnement Railway)
%prod.quarkus.http.port=${PORT:8080}
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL}
%prod.quarkus.datasource.username=${DATABASE_USERNAME}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD}
# update = ne recrée pas les tables, ajoute seulement les nouveaux champs
%prod.quarkus.hibernate-orm.database.generation=update
# ON CONFLICT DO NOTHING dans import.sql => seed idempotent à chaque deploy
%prod.quarkus.hibernate-orm.sql-load-script=import.sql
