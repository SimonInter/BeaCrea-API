# Database (Dev Services auto-start PostgreSQL via Docker en dev)
quarkus.datasource.db-kind=postgresql

# Dev: recreate DB at each start + load seed data
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.hibernate-orm.log.sql=false

# Jackson: dates as ISO strings
quarkus.jackson.serialization.write-dates-as-timestamps=false

# CORS: autorise le frontend Vite en dev + Netlify en prod
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,${ALLOWED_ORIGINS:http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.access-control-allow-credentials=true

# Production (valeurs injectées via variables d'environnement Railway)
%prod.quarkus.http.port=${PORT:8080}
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL}
%prod.quarkus.datasource.username=${DATABASE_USERNAME}
%prod.quarkus.datasource.password=${DATABASE_PASSWORD}
# update = ne recrée pas les tables, ajoute seulement les nouveaux champs
%prod.quarkus.hibernate-orm.database.generation=update
# ON CONFLICT DO NOTHING dans import.sql => seed idempotent à chaque deploy
%prod.quarkus.hibernate-orm.sql-load-script=import.sql
